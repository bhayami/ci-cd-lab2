name: CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v1.0.0
            ghcr.io/${{ github.repository }}:${{ github.sha }}


  deploy-staging:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://example-staging-url.com

    steps:
      - name: Approve and promote to staging
        run: echo "Deploying to staging..."

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://example-prod-url.com

    steps:
      - name: Approve and promote to prod
        run: echo "Deploying to production..."


