name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature-*
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest || true

      - name: Build Docker image
        run: docker build -t ci-cd-lab:latest .
